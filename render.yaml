services:
  - type: web
    name: ticket-booking-backend-web
    env: python
    buildCommand: pip install -r ticket_booking/requirements.txt
    startCommand: bash entrypoint-web.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DJANGO_SETTINGS_MODULE
        value: "ticket_booking.settings"
      - key: PORT
        value: "10000"

  - type: worker
    name: ticket-booking-celery-worker
    env: python
    buildCommand: pip install -r ticket_booking/requirements.txt
    startCommand: bash entrypoint-worker.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DJANGO_SETTINGS_MODULE
        value: "ticket_booking.settings"

  - type: worker
    name: ticket-booking-celery-beat
    env: python
    buildCommand: pip install -r ticket_booking/requirements.txt
    startCommand: bash entrypoint-beat.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DJANGO_SETTINGS_MODULE
        value: "ticket_booking.settings"
